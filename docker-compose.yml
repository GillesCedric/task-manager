services:
  # ─── MySQL ──────────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE:      task_manager
      MYSQL_USER:          app
      MYSQL_PASSWORD:      app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Symfony ─────────────────────────────────────────────────────────
  backend:
    build:
      context: backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV:        dev
      APP_SECRET:     dev_secret_32chars_minimum_here_!
      DATABASE_URL:   "mysql://app:app@db:3306/task_manager?serverVersion=8.0&charset=utf8mb4"
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: dev_passphrase
      CORS_ALLOW_ORIGIN: "^https?://localhost(:[0-9]+)?$"
    volumes:
      # Mount JWT keys for local dev (NOT in production)
      - ./backend/config/jwt:/var/www/html/config/jwt:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Frontend React ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  db_data:
