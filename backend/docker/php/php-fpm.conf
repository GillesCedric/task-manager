; Override pool configuration for production
[www]
user  = app
group = app

; Listen on TCP socket (nginx on same container)
listen = 127.0.0.1:9000

; Dynamic process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Log slow requests (> 2s) for monitoring
request_slowlog_timeout = 2s
slowlog = /dev/stderr

; Security: clear environment before passing to PHP
clear_env = yes

; Pass only whitelisted env vars
env[APP_ENV]        = $APP_ENV
env[APP_SECRET]     = $APP_SECRET
env[DATABASE_URL]   = $DATABASE_URL
env[JWT_SECRET_KEY] = $JWT_SECRET_KEY
env[JWT_PUBLIC_KEY] = $JWT_PUBLIC_KEY
env[JWT_PASSPHRASE] = $JWT_PASSPHRASE
env[CORS_ALLOW_ORIGIN] = $CORS_ALLOW_ORIGIN
env[RAILWAY_ENVIRONMENT] = $RAILWAY_ENVIRONMENT
