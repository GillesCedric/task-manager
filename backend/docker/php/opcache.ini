; OPcache production tuning — critique pour les performances Symfony

; Activation
opcache.enable         = 1
opcache.enable_cli     = 0

; Mémoire — 256MB pour un projet moyen Symfony
opcache.memory_consumption     = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000

; Validation — désactiver en prod (fichiers ne changent pas dans le conteneur)
opcache.validate_timestamps = 0
opcache.revalidate_freq     = 0

; Optimisation
opcache.fast_shutdown         = 1
opcache.huge_code_pages       = 1
opcache.preload_user          = app
; opcache.preload            = /var/www/html/config/preload.php  # Symfony preload

; JIT (PHP 8+) — mode tracing, optimal pour API REST
opcache.jit                   = tracing
opcache.jit_buffer_size       = 64M
