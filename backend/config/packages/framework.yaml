framework:
    secret: "%env(APP_SECRET)%"
    http_method_override: false
    handle_all_throwables: true
    php_errors:
        log: true
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native
    request:
        formats:
            json: ["application/json"]

    # HTML Sanitizer — doit être sous la clé framework en Symfony 7.4
    # (pas dans un fichier html_sanitizer.yaml séparé)
    html_sanitizer:
        sanitizers:
            default:
                allow_safe_elements: true
                allow_static_elements: false

    cache:
        pools:
            task.cache_pool:
                adapter: cache.app
                tags: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
