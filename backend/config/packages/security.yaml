security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class:    App\Entity\User
                property: email

    firewalls:
        dev:
            pattern:  ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api_public:
            pattern:  ^/api/(auth/(login|register)|lists/join/|health)
            security: false

        api_docs:
            pattern:  ^/api/doc
            security: false

        api:
            pattern:   ^/api
            stateless: true
            jwt: ~

    role_hierarchy:
        ROLE_ADMIN: [ROLE_USER]

    access_control:
        - { path: ^/api/auth/login,        roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register,     roles: PUBLIC_ACCESS }
        - { path: ^/api/lists/join/,       roles: PUBLIC_ACCESS }
        - { path: ^/api/doc,               roles: PUBLIC_ACCESS }
        - { path: ^/api/health,            roles: PUBLIC_ACCESS }
        - { path: ^/api/admin/logs/client, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/admin,             roles: ROLE_ADMIN }
        - { path: ^/api,                   roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10