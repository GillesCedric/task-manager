nelmio_api_doc:
    documentation:
        info:
            title:       'Task Manager API'
            description: 'API REST de gestion de tâches — Symfony 7.4 LTS + JWT'
            version:     '1.0.0'
        components:
            securitySchemes:
                bearerAuth:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - bearerAuth: []
        servers:
            - url:         'http://localhost:8000'
              description: 'Développement local'
    areas:
        path_patterns:
            - ^/api(?!/doc)
    # Désactiver le sandbox Swagger si asset-mapper pose problème
    use_validation_groups: false
