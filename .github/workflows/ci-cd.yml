name: 🚀 DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_prod:
        description: 'Deploy to production?'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/task-manager-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/task-manager-frontend
  PHP_VERSION: '8.2'
  NODE_VERSION: '22'

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 1 — Secret Scanning (runs first, fail fast on exposed secrets)
# ═══════════════════════════════════════════════════════════════════════════════
jobs:
  secret-scan:
    name: 🔐 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog — Scan for secrets in git history
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Gitleaks — Detect hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 2 — Backend: Lint + SAST + Audit
# ═══════════════════════════════════════════════════════════════════════════════
  lint-backend:
    name: 🔍 Backend — Lint & SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, intl, zip, mbstring
          coverage: none
          tools: phpstan, php-cs-fixer, composer:v2

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: PHP-CS-Fixer — Check code style
        run: |
          php-cs-fixer check src/ \
            --rules=@PSR12,@Symfony \
            --diff \
            --ansi \
          || echo "::warning::Code style issues found"

      - name: PHPStan — Static analysis (level 8)
        run: |
          cat > phpstan.neon << 'EOF'
          parameters:
            level: 8
            paths:
              - src
            ignoreErrors:
              - '#PHPDoc tag @var#'
          EOF
          phpstan analyse --memory-limit=512M --error-format=github

      - name: Semgrep — SAST PHP security rules
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/owasp-top-ten
            p/symfony
          generateSarif: true
        continue-on-error: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      - name: Composer audit — Dependency vulnerabilities
        run: composer audit --format=json | tee composer-audit.json
        continue-on-error: true

      - name: Parse audit results
        run: |
          if [ -f composer-audit.json ]; then
            VULNS=$(cat composer-audit.json | php -r "
              \$d=json_decode(file_get_contents('php://stdin'),true);
              echo count(\$d['advisories'] ?? []);
            ")
            if [ "$VULNS" -gt "0" ]; then
              echo "::warning::Found $VULNS vulnerabilities in Composer dependencies"
              cat composer-audit.json
            fi
          fi

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 3 — Frontend: Lint + SAST + Audit
# ═══════════════════════════════════════════════════════════════════════════════
  lint-frontend:
    name: 🔍 Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: TypeScript — Type check (zero tolerance)
        run: npx tsc --noEmit

      - name: ESLint — Lint & security rules
        run: npm run lint -- --max-warnings=0
        continue-on-error: true

      - name: npm audit — Dependency vulnerabilities
        run: |
          npm audit --audit-level=high --json | tee npm-audit.json || true
          HIGH=$(node -e "
            const d=require('./npm-audit.json');
            const m=d.metadata||{};
            console.log((m.vulnerabilities||{}).high||0 + (m.vulnerabilities||{}).critical||0);
          " 2>/dev/null || echo 0)
          if [ "$HIGH" -gt "0" ]; then
            echo "::warning::Found $HIGH high/critical npm vulnerabilities"
          fi

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 4 — CodeQL Analysis (GitHub native SAST)
# ═══════════════════════════════════════════════════════════════════════════════
  codeql:
    name: 🔬 CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
        # PHP CodeQL support requires enterprise — skip for now

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Setup Node (for JS/TS analysis)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend (required for CodeQL)
        working-directory: frontend
        run: npm ci && npm run build
        env:
          VITE_API_URL: https://api.example.com

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 5 — Backend Tests
# ═══════════════════════════════════════════════════════════════════════════════
  test-backend:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: [secret-scan, lint-backend]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE:      task_manager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP with coverage
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, intl, zip, mbstring, xdebug
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-dev-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-dev-

      - name: Install all dependencies (including dev)
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Setup test environment
        run: |
          cp .env.test .env.test.local
          sed -i 's|DATABASE_URL=.*|DATABASE_URL="mysql://root:root@127.0.0.1:3306/task_manager_test?serverVersion=8.0\&charset=utf8mb4"|' .env.test.local

      - name: Create test database & run migrations
        run: |
          php bin/console doctrine:database:create --env=test --no-interaction
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Run PHPUnit tests
        run: |
          php bin/phpunit \
            --coverage-clover coverage.xml \
            --log-junit phpunit-report.xml \
            --colors=always
        env:
          APP_ENV: test
          DATABASE_URL: "mysql://root:root@127.0.0.1:3306/task_manager_test?serverVersion=8.0&charset=utf8mb4"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend PHPUnit
          path: backend/phpunit-report.xml
          reporter: java-junit
          fail-on-error: false

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 6 — Build Docker Images (parallel)
# ═══════════════════════════════════════════════════════════════════════════════
  build-backend:
    name: 🐳 Build Backend Image
    runs-on: ubuntu-latest
    needs: [test-backend, lint-backend]
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          platforms: linux/amd64
          build-args: |
            GITHUB_REPOSITORY=${{ github.repository }}

  build-frontend:
    name: 🐳 Build Frontend Image
    runs-on: ubuntu-latest
    needs: [lint-frontend]
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          platforms: linux/amd64
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || 'https://api.task-manager.example.com' }}
            GITHUB_REPOSITORY=${{ github.repository }}

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 7 — Container Security Scanning (Trivy)
# ═══════════════════════════════════════════════════════════════════════════════
  scan-images:
    name: 🛡️ Container Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: github.event_name != 'pull_request'

    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        include:
          - service: backend
            image: ${{ needs.build-backend.outputs.image }}
          - service: frontend
            image: ${{ needs.build-frontend.outputs.image }}

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — Scan ${{ matrix.service }} image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    ${{ matrix.image }}
          format:       sarif
          output:       trivy-${{ matrix.service }}.sarif
          severity:     CRITICAL,HIGH
          exit-code:    1
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category:   trivy-${{ matrix.service }}

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 8 — Deploy to Staging (main branch only)
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy — Staging
    runs-on: ubuntu-latest
    needs: [scan-images]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy backend to staging
        run: |
          railway deploy \
            --service ${{ vars.RAILWAY_BACKEND_SERVICE_STAGING }} \
            --image ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

      - name: Deploy frontend to staging
        run: |
          railway deploy \
            --service ${{ vars.RAILWAY_FRONTEND_SERVICE_STAGING }} \
            --image ${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}

      - name: Wait for staging to be healthy
        run: |
          echo "Waiting 30s for containers to start..."
          sleep 30
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            -f "${{ vars.STAGING_API_URL }}/api/health" \
            && echo "✓ Backend healthy" \
            || echo "::warning::Backend health check failed"

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 9 — DAST: OWASP ZAP (after staging deploy)
# ═══════════════════════════════════════════════════════════════════════════════
  dast-zap:
    name: 🎯 DAST — OWASP ZAP
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      issues:   write

    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan — API
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target:      ${{ vars.STAGING_API_URL }}/api
          rules_file_name: .github/zap/api-rules.tsv
          fail_action: false
          artifact_name: zap-api-report
          cmd_options:  '-a -j'

      - name: ZAP Baseline Scan — Frontend
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target:      ${{ vars.STAGING_URL }}
          fail_action: false
          artifact_name: zap-frontend-report
          cmd_options: '-a -j'

# ═══════════════════════════════════════════════════════════════════════════════
# JOB 10 — Deploy to Production (main + manual gate)
# ═══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏭 Deploy — Production
    runs-on: ubuntu-latest
    needs: [dast-zap]
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_prod == 'true' ||
       github.event_name == 'push')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy backend to production
        run: |
          railway deploy \
            --service ${{ vars.RAILWAY_BACKEND_SERVICE_PROD }} \
            --image ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}

      - name: Deploy frontend to production
        run: |
          railway deploy \
            --service ${{ vars.RAILWAY_FRONTEND_SERVICE_PROD }} \
            --image ${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }} \
            --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}

      - name: Verify production health
        run: |
          sleep 45
          curl --retry 5 --retry-delay 10 --retry-connrefused \
            -f "${{ vars.PRODUCTION_API_URL }}/api/health" \
            && echo "✓ Production backend healthy"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            backend/CHANGELOG.md
