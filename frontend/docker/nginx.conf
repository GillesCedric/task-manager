server {
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Logging → stdout/stderr for Railway
    access_log /dev/stdout combined;
    error_log  /dev/stderr warn;

    # ─── Health check ─────────────────────────────────────────────────────────
    location = /health.txt {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ─── Static assets: long-term cache (content-hashed by Vite) ─────────────
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        add_header  X-Content-Type-Options "nosniff";
        access_log  off;
        try_files   $uri =404;
    }

    # ─── SPA fallback: all routes → index.html (React Router) ───────────────
    location / {
        try_files $uri $uri/ /index.html;

        # Security headers
        add_header X-Frame-Options          "DENY"              always;
        add_header X-Content-Type-Options   "nosniff"           always;
        add_header X-XSS-Protection         "1; mode=block"     always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;
    }

    # ─── Deny hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
    }

    # Basic upload size limit
    client_max_body_size 1m;
}
